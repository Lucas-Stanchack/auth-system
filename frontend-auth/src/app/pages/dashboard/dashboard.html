<section class="dashboard-screen">
  <div class="dashboard-card">
    
    <div class="dashboard-header">
  <h2>Bem-vindo, {{ nomeUsuario }}</h2>
  <button class="btn-logout" (click)="logout()">Sair</button>
</div>

    

    <div class="kpi-container">
      <div class="kpi-card">
        <span>Total</span>
        <h3>{{ usuariosFiltrados.length }}</h3>
      </div>
      <div class="kpi-card">
        <span>Status</span>
        <h3 style="color: #27ae60;">Online</h3>
      </div>
    </div>
<input type="text" [(ngModel)]="filtro" placeholder="Buscar usuário ou email..." class="search-input">
   <ul class="user-list">
  <li *ngFor="let user of usuariosFiltrados; let i = index" 
      [style.animation-delay]="i * 0.1 + 's'">
      
    <strong>{{ user.nome }}</strong> - {{ user.email }}
    <button [routerLink]="['/edituser', user.id]" class="btn-edit">Editar</button>
  </li>
</ul>
    
  </div>
</section>
